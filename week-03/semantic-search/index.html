<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Week 3 Semantic Search</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 44px 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 5vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 14px 0 28px;
        max-width: 840px;
        color: #5f6f86;
        font-size: 22px;
        line-height: 1.35;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 18px;
      }

      .panel {
        border: 1px solid #d7dfec;
        border-radius: 8px;
        background: #ffffff;
      }

      .search-panel {
        padding: 18px;
      }

      form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 120px;
        gap: 12px;
      }

      input,
      button {
        min-height: 48px;
        border-radius: 8px;
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid #c9d3e2;
        padding: 0 14px;
        color: #111827;
      }

      button {
        border: 0;
        background: #155eef;
        color: #ffffff;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .results {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .result {
        border: 1px solid #d7dfec;
        border-radius: 8px;
        padding: 16px;
        background: #fbfdff;
      }

      .result-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .result h2,
      .debug h2 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
      }

      .score {
        border-radius: 999px;
        background: #e7f0ff;
        color: #155eef;
        padding: 5px 10px;
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
      }

      .result p,
      .debug p {
        margin: 10px 0 0;
        color: #4b5563;
        line-height: 1.5;
      }

      .matches {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }

      .matches span {
        border-radius: 999px;
        background: #eaf8ef;
        color: #17663a;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 700;
      }

      .debug {
        padding: 16px;
      }

      .debug dl {
        display: grid;
        gap: 10px;
        margin: 16px 0 0;
      }

      .debug dt {
        color: #667085;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .debug dd {
        margin: 3px 0 0;
        color: #111827;
        line-height: 1.4;
      }

      code {
        white-space: normal;
        word-break: break-word;
      }

      @media (max-width: 760px) {
        .layout,
        form {
          grid-template-columns: 1fr;
        }

        .subtitle {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Semantic Search Shape</h1>
      <p class="subtitle">
        Query text becomes a vector. Documents become vectors. Cosine similarity
        ranks the closest meaning.
      </p>

      <div class="layout">
        <section class="panel search-panel" aria-label="Semantic search">
          <form id="searchForm">
            <input
              id="queryInput"
              name="query"
              value="how do we reduce hallucination with evidence"
              autocomplete="off"
            />
            <button id="searchButton" type="submit">Search</button>
          </form>

          <div id="results" class="results" aria-live="polite"></div>
        </section>

        <aside class="panel debug" aria-label="Search debug">
          <h2>Vector Debug</h2>
          <p>Real embeddings are dense model vectors. This lab uses visible word-count vectors.</p>
          <dl>
            <div>
              <dt>Query Tokens</dt>
              <dd><code id="queryTokens">-</code></dd>
            </div>
            <div>
              <dt>Vocabulary Size</dt>
              <dd id="vocabularySize">-</dd>
            </div>
            <div>
              <dt>Vocabulary</dt>
              <dd><code id="vocabulary">-</code></dd>
            </div>
          </dl>
        </aside>
      </div>
    </main>

    <script>
      const form = document.querySelector("#searchForm");
      const input = document.querySelector("#queryInput");
      const button = document.querySelector("#searchButton");
      const results = document.querySelector("#results");
      const queryTokens = document.querySelector("#queryTokens");
      const vocabularySize = document.querySelector("#vocabularySize");
      const vocabulary = document.querySelector("#vocabulary");

      function renderResults(payload) {
        queryTokens.textContent = payload.queryTokens.join(", ") || "-";
        vocabularySize.textContent = String(payload.debug.vocabularySize);
        vocabulary.textContent = payload.debug.vocabulary.join(", ");

        results.innerHTML = payload.topResults
          .map((result) => {
            const matches = result.matchedWords.length
              ? result.matchedWords.map((word) => `<span>${word}</span>`).join("")
              : "<span>No shared words in this simple demo</span>";

            return `
              <article class="result">
                <div class="result-header">
                  <h2>${result.title}</h2>
                  <span class="score">${result.score.toFixed(3)}</span>
                </div>
                <p>${result.text}</p>
                <div class="matches">${matches}</div>
              </article>
            `;
          })
          .join("");
      }

      async function search(query) {
        button.disabled = true;
        button.textContent = "Searching";

        try {
          const response = await fetch("/api/search", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ query }),
          });

          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.error || "Search failed");
          }

          renderResults(payload);
        } catch (error) {
          results.innerHTML = `<article class="result"><p>${error.message}</p></article>`;
        } finally {
          button.disabled = false;
          button.textContent = "Search";
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        search(input.value.trim());
      });

      search(input.value.trim());
    </script>
  </body>
</html>
