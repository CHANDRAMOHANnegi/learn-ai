<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Structured Output</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f7fb;
        color: #151922;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      p {
        color: #647084;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      textarea,
      pre {
        width: 100%;
        min-height: 420px;
        border: 1px solid #d9dfeb;
        border-radius: 8px;
        background: white;
        padding: 14px;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
        overflow: auto;
      }

      button {
        margin: 14px 0;
        border: 0;
        border-radius: 8px;
        padding: 12px 18px;
        background: #1463ff;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
        color: #32425f;
      }

      .status {
        min-height: 22px;
        color: #647084;
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Structured Output</h1>
      <p>Paste profile text, extract strict JSON, then validate the schema.</p>

      <div class="grid">
        <section>
          <textarea id="input">Chandramohan Negi is a Senior Software Engineer focused on React, Next.js, TypeScript, React Native, TailwindCSS, Vitest, Playwright, Firebase, dashboards, and AI-assisted frontend modernization.</textarea>
          <label>
            <input id="simulateBadOutput" type="checkbox" />
            Simulate bad model output, then retry
          </label>
          <button id="extract">Extract JSON</button>
          <div id="status" class="status"></div>
        </section>

        <section>
          <pre id="output">Output will appear here.</pre>
        </section>
      </div>
    </main>

    <script>
      const input = document.querySelector("#input");
      const output = document.querySelector("#output");
      const extract = document.querySelector("#extract");
      const status = document.querySelector("#status");
      const simulateBadOutput = document.querySelector("#simulateBadOutput");

      extract.addEventListener("click", async () => {
        extract.disabled = true;
        status.textContent = "Extracting...";
        output.textContent = "";

        try {
          const response = await fetch("/api/extract", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              text: input.value,
              simulateBadOutput: simulateBadOutput.checked
            })
          });
          const data = await response.json();

          output.textContent = JSON.stringify(data, null, 2);
          status.textContent = data.validation?.ok
            ? "Valid structured output"
            : "Schema validation failed";
        } catch (error) {
          status.textContent = "Request failed. Is the server running?";
          output.textContent = String(error);
        } finally {
          extract.disabled = false;
        }
      });
    </script>
  </body>
</html>
